<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>邮箱行转PHP $all_emails 数组格式化工具</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Microsoft Yahei,Consolas}
body{background:#f3f4f6;padding:30px;max-width:1000px;margin:0 auto}
.box{background:#fff;padding:24px;border-radius:8px;box-shadow:0 1px 8px #00000012;margin-bottom:20px}
h3{margin-bottom:12px;color:#222}
.tip{color:#666;font-size:14px;margin-bottom:10px}
textarea{width:100%;min-height:240px;padding:12px;border:1px solid #ddd;border-radius:6px;font-size:14px;white-space:pre}
.btns{margin:14px 0;display:flex;gap:10px}
button{padding:10px 20px;border:none;border-radius:5px;font-size:14px;cursor:pointer}
#trans{background:#1677ff;color:#fff}
#clear{background:#eee;color:#333}
#copyTip{color:#00a854;margin-top:8px;display:none}
</style>
</head>
<body>
<div class="box">
    <h3>输入区：每行一个邮箱</h3>
    <p class="tip">粘贴所有单行@qq.com邮箱，一行一条</p>
    <textarea id="input"></textarea>
    <div class="btns">
        <button id="trans">转换为PHP数组（5个一行）</button>
        <button id="clear">清空内容</button>
    </div>
</div>

<div class="box">
    <h3>输出结果（直接复制替换config.php的$all_emails）</h3>
    <textarea id="output" readonly></textarea>
    <div id="copyTip">✅ 已自动复制到剪贴板</div>
</div>

<script>
const input = document.getElementById('input');
const output = document.getElementById('output');
const transBtn = document.getElementById('trans');
const clearBtn = document.getElementById('clear');
const copyTip = document.getElementById('copyTip');

transBtn.onclick = ()=>{
    let raw = input.value.trim();
    if(!raw){
        alert('请粘贴邮箱列表！');
        return;
    }
    // 分割每行，过滤空行
    let lines = raw.split(/\r?\n/).filter(item=>item.trim()!=='');
    // 包裹双引号
    let arr = lines.map(item=>`"${item.trim()}"`);
    // 5个一行拼接
    let resStr = '$all_emails = [\n';
    for(let i=0;i<arr.length;i+=5){
        let slice = arr.slice(i,i+5);
        resStr += '    ' + slice.join(',') + ',\n';
    }
    resStr += '];';
    output.value = resStr;

    // 自动复制
    output.select();
    document.execCommand('copy');
    copyTip.style.display = 'block';
    setTimeout(()=>copyTip.style.display='none',2000);
}

clearBtn.onclick = ()=>{
    input.value = '';
    output.value = '';
    copyTip.style.display = 'none';
}
</script>
</body>
</html>
